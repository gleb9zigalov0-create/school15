<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Модерация | Школа №15</title>
    <link rel="stylesheet" href="common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #b0dff5 0%, #cceef8 50%, #b8e4fa 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .glass-moderate {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        h1 { text-align: center; color: #0a3f6f; font-size: 2rem; margin-bottom: 0.5rem; }
        .sub { text-align: center; color: #2c5a7a; margin-bottom: 2rem; }
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .project-item {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .project-info {
            flex: 1;
        }
        .project-title {
            font-weight: bold;
            color: #0a3f6f;
        }
        .project-subject {
            font-size: 0.8rem;
            color: #2c5a7a;
        }
        .project-actions button {
            background: #0a3f6f;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        .project-actions button.approve { background: #2e7d64; }
        .project-actions button.reject { background: #e94560; }
        .empty-state { text-align: center; padding: 3rem; background: rgba(255,255,255,0.5); border-radius: 48px; }
        .back-link { display: block; text-align: center; margin-top: 2rem; color: #0a3f6f; text-decoration: none; }
    </style>
</head>
<body>
<div class="glass-moderate">
    <h1>🛡 Панель модерации</h1>
    <div class="sub">Проекты, ожидающие проверки</div>
    <div id="moderatorContent"></div>
    <a href="index.html" class="back-link">← На главную</a>
</div>
<script src="js/project-storage.js"></script>
<script>
    if (localStorage.getItem('moderator_mode') !== 'true') {
        window.location.href = 'index.html';
    }

    async function loadProjects() {
        const allProjects = ProjectStorage.getProjects();
        const pending = allProjects.filter(p => p.status === 'pending');
        
        const container = document.getElementById('moderatorContent');
        
        if (pending.length === 0) {
            container.innerHTML = '<div class="empty-state">✅ Нет проектов на модерации.</div>';
            return;
        }
        
        let html = '<div class="project-list">';
        for (const proj of pending) {
            html += `
                <div class="project-item">
                    <div class="project-info">
                        <div class="project-title">${escapeHtml(proj.title)}</div>
                        <div class="project-subject">📚 ${escapeHtml(proj.subject || 'Без предмета')}</div>
                        <div style="font-size:0.8rem;">${escapeHtml(proj.description?.substring(0, 100) || '—')}</div>
                    </div>
                    <div class="project-actions">
                        <button class="approve" onclick="approveProject('${proj.id}')">✅ Одобрить</button>
                        <button class="reject" onclick="rejectProject('${proj.id}')">❌ Отклонить</button>
                        <button onclick="downloadProject('${proj.id}')">📥 Скачать</button>
                    </div>
                </div>
            `;
        }
        html += '</div>';
        container.innerHTML = html;
    }

    window.approveProject = async (id) => {
        const projects = ProjectStorage.getProjects();
        const index = projects.findIndex(p => p.id === id);
        if (index !== -1) {
            projects[index].status = 'approved';
            ProjectStorage.saveProjects(projects);
            alert('✅ Проект одобрен!');
            loadProjects();
        }
    };

    window.rejectProject = async (id) => {
        if (confirm('Удалить проект?')) {
            await ProjectStorage.deleteProject(id);
            alert('❌ Проект удалён');
            loadProjects();
        }
    };

    window.downloadProject = async (id) => {
        const files = await ProjectStorage.listProjectFiles(id);
        if (files.length === 1) {
            ProjectStorage.downloadRecord(files[0]);
        } else if (files.length > 1) {
            alert(`В проекте несколько файлов. Скачивается первый.`);
            ProjectStorage.downloadRecord(files[0]);
        } else {
            alert('Файлы не найдены');
        }
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    loadProjects();
</script>
</body>
</html>
