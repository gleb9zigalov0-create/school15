<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка проекта | Школа №15</title>
    <link rel="stylesheet" href="common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #b0dff5, #cceef8);
            min-height: 100vh;
            padding: 2rem;
        }
        .glass {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
        }
        h1 { color: #0a3f6f; text-align: center; margin-bottom: 1.5rem; }
        label { font-weight: 600; color: #0a3f6f; display: block; margin-top: 1rem; margin-bottom: 0.3rem; }
        input, select, textarea {
            width: 100%;
            padding: 0.7rem;
            border-radius: 40px;
            border: none;
            background: rgba(255,255,255,0.8);
            font-size: 1rem;
        }
        textarea { border-radius: 24px; resize: vertical; }
        .color-preview { width: 50px; height: 50px; border-radius: 20px; margin-top: 0.5rem; border: 2px solid white; }
        .submit-btn {
            background: #0a3f6f;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 1.5rem;
            cursor: pointer;
            width: 100%;
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #0a3f6f;
        }
    </style>
</head>
<body>
<div class="glass">
    <h1>📤 Загрузить проект</h1>
    <label>Название проекта</label>
    <input type="text" id="title" placeholder="Например: Материки Евразии">

    <label>Предмет</label>
    <select id="subject">
        <option value="Математика">📐 Математика</option>
        <option value="Русский язык">📖 Русский язык</option>
        <option value="Литература">📚 Литература</option>
        <option value="Английский язык">🇬🇧 Английский язык</option>
        <option value="История">🏛️ История</option>
        <option value="Обществознание">⚖️ Обществознание</option>
        <option value="География">🌍 География</option>
        <option value="Биология">🧬 Биология</option>
        <option value="Физика">⚡ Физика</option>
        <option value="Химия">🧪 Химия</option>
        <option value="Информатика">💻 Информатика</option>
        <option value="Технология">🛠️ Технология</option>
        <option value="ИЗО">🎨 ИЗО</option>
        <option value="Музыка">🎵 Музыка</option>
        <option value="Физкультура">🏅 Физкультура</option>
        <option value="ОБЗР">🛡️ ОБЗР</option>
        <option value="ОДНКНР">📖 ОДНКНР</option>
        <option value="Другое">✨ Другое</option>
    </select>

    <label>Краткое описание</label>
    <textarea id="desc" rows="3" placeholder="О чём проект?"></textarea>

    <label>Цвет карточки (фон нижней половины)</label>
    <input type="color" id="color" value="#cce8f5">
    <div class="color-preview" id="colorPreview" style="background: #cce8f5;"></div>

    <label>Ссылка на картинку (или URL превью)</label>
    <input type="text" id="image" placeholder="https://... или /images/ваша_картинка.jpg">

    <label>Файл проекта (ZIP, папка или один файл)</label>
    <input type="file" id="projectFile" webkitdirectory directory multiple>
    <small style="color:#0a3f6f; display:block; margin-top:5px;">📁 Можно загрузить папку целиком</small>

    <button class="submit-btn" id="submitBtn">🚀 Отправить на модерацию</button>
    <a href="projects.html" class="back-btn">← Назад к проектам</a>
</div>

<script src="js/project-storage.js"></script>
<script>
    document.getElementById('color').addEventListener('input', (e) => {
        document.getElementById('colorPreview').style.background = e.target.value;
    });

    document.getElementById('submitBtn').onclick = async () => {
        const title = document.getElementById('title').value.trim();
        const subject = document.getElementById('subject').value;
        const description = document.getElementById('desc').value.trim();
        const color = document.getElementById('color').value;
        const image = document.getElementById('image').value.trim() || 'https://placehold.co/300x160/8fc9e8/white?text=Нет+фото';
        const fileInput = document.getElementById('projectFile');
        
        if (!title) {
            alert('Введите название проекта!');
            return;
        }

        if (!fileInput.files.length) {
            alert('Выберите папку или файл проекта!');
            return;
        }

        const projectId = Date.now().toString();
        
        try {
            const result = await ProjectStorage.saveProjectFolder(projectId, fileInput.files);
            
            let thumb = null;
            // Пробуем найти картинку для превью
            for (let f of fileInput.files) {
                if (f.type.startsWith('image/')) {
                    thumb = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = () => resolve(null);
                        reader.readAsDataURL(f);
                    });
                    break;
                }
            }
            
            const projects = ProjectStorage.getProjects();
            projects.push({
                id: projectId,
                title: title,
                subject: subject,
                description: description,
                color: color,
                image: image,
                thumb: thumb,
                status: 'pending',
                createdAt: new Date().toISOString()
            });
            ProjectStorage.saveProjects(projects);
            
            alert('✅ Проект отправлен на модерацию!');
            window.location.href = 'projects.html';
        } catch (err) {
            alert('Ошибка: ' + err.message);
        }
    };
</script>
</body>
</html>
