<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Чат 5А | Школа №15</title>
    <link rel="stylesheet" href="common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: url('images/fon.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
        }
        .chat-main-container {
            width: 1400px;
            max-width: 98vw;
            height: 90vh;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .members-panel {
            width: 280px;
            background: rgba(10, 30, 50, 0.3);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .members-header { padding: 1.5rem 1rem; font-weight: bold; color: white; background: rgba(0, 0, 0, 0.2); font-size: 1.1rem; }
        .members-list { flex: 1; list-style: none; padding: 0.5rem; }
        .member-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 0.5rem;
        }
        .member-avatar {
            width: 44px;
            height: 44px;
            background: #0a3f6f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .member-info { flex: 1; }
        .member-name { font-weight: 600; color: white; font-size: 0.9rem; }
        .member-status { font-size: 0.7rem; opacity: 0.8; }
        .online-status { color: #4ade80; }
        .offline-status { color: #9ca3af; }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
        }
        .chat-header {
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .chat-title { font-weight: bold; color: white; font-size: 1.1rem; }
        .settings-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            max-width: 80%;
        }
        .message.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-avatar {
            width: 32px;
            height: 32px;
            background: #0a3f6f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .msg-bubble {
            background: rgba(255, 255, 255, 0.9);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            color: #1e2f3e;
        }
        .message.mine .msg-bubble {
            background: #0a3f6f;
            color: white;
        }
        .msg-name { font-size: 0.65rem; font-weight: bold; margin-bottom: 0.2rem; }
        .msg-text { font-size: 0.9rem; }
        .msg-time { font-size: 0.6rem; opacity: 0.6; margin-top: 0.2rem; text-align: right; }
        .input-panel {
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            display: flex;
            gap: 0.6rem;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 15;
        }
        .icon-button {
            background: rgba(255, 255, 255, 0.3);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-button:hover { background: rgba(255,255,255,0.6); transform: scale(1.02); }
        .text-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            outline: none;
        }

        /* МОДАЛКИ */
        .modal-wrapper {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 25;
            pointer-events: none;
        }
        .modal {
            width: calc(100% - 2rem);
            max-width: 500px;
            background: rgba(30, 47, 62, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .modal.active {
            opacity: 1;
            transform: translateY(0);
        }
        .modal-handle {
            width: 50px;
            height: 5px;
            background: #7f8c8d;
            border-radius: 10px;
            margin: 12px auto 8px;
            cursor: grab;
            user-select: none;
        }
        .modal-handle:active { cursor: grabbing; }
        .modal-content-inner {
            padding: 0 1rem 1.5rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .close-btn {
            background: #0a3f6f;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            margin-top: 1rem;
            cursor: pointer;
            width: 100%;
        }
        .sticker-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .sticker-img {
            width: 85px;
            cursor: pointer;
            background: white;
            border-radius: 20px;
            padding: 0.3rem;
            transition: 0.1s;
        }
        .sticker-img:hover { transform: scale(1.05); }
        .attach-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .attach-item {
            text-align: center;
            flex: 1;
            min-width: 70px;
            cursor: pointer;
        }
        .attach-icon {
            font-size: 2.2rem;
            filter: grayscale(100%);
            opacity: 0.7;
            transition: 0.1s;
        }
        .attach-icon:hover { opacity: 1; transform: scale(1.05); }
        .attach-label {
            font-size: 0.65rem;
            color: #bbb;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>

<div class="chat-main-container">
    <div class="members-panel">
        <div class="members-header">👥 Участники 5А</div>
        <ul class="members-list" id="membersList"></ul>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="chat-header">
            <span class="chat-title">💬 Общий чат 5 «А»</span>
            <button class="settings-btn" id="settingsBtn">⚙️ Настройки</button>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-panel">
            <button class="icon-button" id="stickerBtn">😊</button>
            <input type="text" class="text-input" id="messageInput" placeholder="Сообщение...">
            <button class="icon-button" id="attachBtn">📎</button>
            <button class="icon-button" id="sendBtn">➤</button>
        </div>

        <!-- МОДАЛКА СТИКЕРОВ -->
        <div class="modal-wrapper" id="stickerWrapper">
            <div class="modal" id="stickerModal">
                <div class="modal-handle" id="stickerHandle"></div>
                <div class="modal-content-inner" id="stickerModalContent"></div>
            </div>
        </div>

        <!-- МОДАЛКА СКРЕПКИ -->
        <div class="modal-wrapper" id="attachWrapper">
            <div class="modal" id="attachModal">
                <div class="modal-handle" id="attachHandle"></div>
                <div class="modal-content-inner" id="attachModalContent"></div>
            </div>
        </div>
    </div>
</div>

<script src="js/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    let messagesUnsub = null;
    const CHAT_PATH = 'class5a_chat';
    const usersCache = new Map();

    function getAvatarHtml(avatarBase64, name) {
        if (avatarBase64 && avatarBase64.startsWith('data:image')) {
            return `<img src="${avatarBase64}" style="width:100%; height:100%; object-fit:cover;">`;
        }
        return (name?.charAt(0) || '?').toUpperCase();
    }

    async function getUserData(uid) {
        if (usersCache.has(uid)) return usersCache.get(uid);
        const doc = await db.collection('users').doc(uid).get();
        const data = doc.data() || { name: 'Ученик', avatarBase64: null };
        usersCache.set(uid, data);
        return data;
    }

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        await db.collection('status').doc(user.uid).set({ online: true, name: user.displayName || 'Ученик' }, { merge: true });
        loadMessages();
        loadMembers();
        window.addEventListener('beforeunload', () => {
            db.collection('status').doc(user.uid).set({ online: false }, { merge: true });
        });
    });

    function loadMessages() {
        if (messagesUnsub) messagesUnsub();
        messagesUnsub = db.collection('rooms').doc(CHAT_PATH).collection('messages').orderBy('createdAt').onSnapshot(async (snap) => {
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            for (const doc of snap.docs) {
                const m = doc.data();
                const mine = m.uid === currentUser?.uid;
                const userData = await getUserData(m.uid);
                const avatarHtml = getAvatarHtml(userData.avatarBase64, userData.name || m.name);
                const div = document.createElement('div');
                div.className = `message ${mine ? 'mine' : ''}`;
                div.innerHTML = `<div class="msg-avatar">${avatarHtml}</div><div class="msg-bubble"><div class="msg-name">${userData.name || m.name || 'Ученик'}</div><div class="msg-text">${m.sticker ? `<img src="${m.sticker}" style="max-width:130px">` : (m.text || '')}</div><div class="msg-time">${m.createdAt?.toDate().toLocaleTimeString() || ''}</div></div>`;
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        });
    }

    async function loadMembers() {
        db.collection('status').onSnapshot(async (snap) => {
            const container = document.getElementById('membersList');
            container.innerHTML = '';
            for (const doc of snap.docs) {
                const status = doc.data();
                const userData = await getUserData(doc.id);
                const avatarHtml = getAvatarHtml(userData.avatarBase64, userData.name);
                container.innerHTML += `<li class="member-item"><div class="member-avatar">${avatarHtml}</div><div class="member-info"><div class="member-name">${userData.name || status.name || 'Ученик'}</div><div class="member-status ${status.online ? 'online-status' : 'offline-status'}">${status.online ? '🟢 Онлайн' : '⚫ Офлайн'}</div></div></li>`;
            }
        });
    }

    async function sendMessage(text, stickerUrl = null) {
        if (!text.trim() && !stickerUrl) return;
        const userData = await getUserData(currentUser.uid);
        await db.collection('rooms').doc(CHAT_PATH).collection('messages').add({
            text: text,
            sticker: stickerUrl,
            uid: currentUser.uid,
            name: userData.name || currentUser.displayName || 'Ученик',
            createdAt: new Date()
        });
    }

    // ========== СТИКЕРЫ ==========
    function renderStickerModal() {
        const container = document.getElementById('stickerModalContent');
        if (!container) return;
        container.innerHTML = `
            <div class="modal-title">✨ Стикеры</div>
            <div id="stickerList" class="sticker-grid"></div>
            <button class="close-btn" id="stickerModalCloseBtn">Закрыть</button>
        `;
        
        const stickers = ['stickers/okay.gif'];
        const stickerContainer = document.getElementById('stickerList');
        if (stickerContainer) {
            stickerContainer.innerHTML = stickers.map(s => `<img src="${s}" class="sticker-img" data-sticker-url="${s}">`).join('');
            document.querySelectorAll('#stickerList .sticker-img').forEach(img => {
                img.onclick = (e) => {
                    e.stopPropagation();
                    const url = img.getAttribute('data-sticker-url');
                    if (url) {
                        sendMessage('', url);
                        closeModal('stickerModal', 'stickerModalContent');
                    }
                };
            });
        }
        
        const closeBtn = document.getElementById('stickerModalCloseBtn');
        if (closeBtn) {
            closeBtn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                closeModal('stickerModal', 'stickerModalContent');
            };
        }
    }

    // ========== СКРЕПКА ==========
    function renderAttachModal() {
        const container = document.getElementById('attachModalContent');
        if (!container) return;
        container.innerHTML = `
            <div class="modal-title">📎 Отправить</div>
            <div class="attach-grid">
                <div class="attach-item" data-type="photo"><div class="attach-icon">📷</div><div class="attach-label">Фото</div></div>
                <div class="attach-item" data-type="video"><div class="attach-icon">🎥</div><div class="attach-label">Видео</div></div>
                <div class="attach-item" data-type="file"><div class="attach-icon">📄</div><div class="attach-label">Файл</div></div>
                <div class="attach-item" data-type="poll"><div class="attach-icon">📊</div><div class="attach-label">Опрос</div></div>
                <div class="attach-item" data-type="voice"><div class="attach-icon">🎤</div><div class="attach-label">Голос</div></div>
                <div class="attach-item" data-type="link"><div class="attach-icon">🔗</div><div class="attach-label">Ссылка</div></div>
            </div>
            <button class="close-btn" id="attachModalCloseBtn">Закрыть</button>
        `;
        
        document.querySelectorAll('.attach-item').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                alert(`📎 Отправка ${el.dataset.type} — в разработке`);
                closeModal('attachModal', 'attachModalContent');
            };
        });
        
        const closeBtn = document.getElementById('attachModalCloseBtn');
        if (closeBtn) {
            closeBtn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                closeModal('attachModal', 'attachModalContent');
            };
        }
    }

    // ========== ОБЩИЕ ФУНКЦИИ МОДАЛОК ==========
    function closeModal(modalId, contentId) {
        const modal = document.getElementById(modalId);
        if (!modal) return;
        modal.classList.remove('active');
        setTimeout(() => {
            const container = document.getElementById(contentId);
            if (container) container.innerHTML = '';
        }, 300);
    }

    function openModal(modalId, renderFunction) {
        renderFunction();
        const modal = document.getElementById(modalId);
        if (!modal) return;
        modal.classList.add('active');
    }

    function initSwipeClose(modalId, handleId, contentId) {
        const modal = document.getElementById(modalId);
        const handle = document.getElementById(handleId);
        if (!modal || !handle) return;
        
        let startY = 0, startTransform = 0;
        let isDragging = false;
        
        const onTouchStart = (e) => {
            startY = e.touches[0].clientY;
            const transform = modal.style.transform;
            if (transform && transform.includes('translateY')) {
                startTransform = parseFloat(transform.match(/translateY\(([-\d]+)px\)/)?.[1] || 0);
            }
            isDragging = true;
        };
        
        const onTouchMove = (e) => {
            if (!isDragging) return;
            const delta = e.touches[0].clientY - startY;
            if (delta > 0) {
                modal.style.transform = `translateY(${startTransform + delta}px)`;
                modal.style.opacity = '0.7';
            }
        };
        
        const onTouchEnd = (e) => {
            if (!isDragging) return;
            const delta = e.changedTouches[0].clientY - startY;
            if (delta > 80) closeModal(modalId, contentId);
            modal.style.transform = '';
            modal.style.opacity = '';
            isDragging = false;
        };
        
        handle.addEventListener('touchstart', onTouchStart);
        handle.addEventListener('touchmove', onTouchMove);
        handle.addEventListener('touchend', onTouchEnd);
        
        let mouseDown = false;
        let mouseStartY = 0;
        
        handle.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseStartY = e.clientY;
            e.preventDefault();
        });
        
        window.addEventListener('mousemove', (e) => {
            if (!mouseDown) return;
            const delta = e.clientY - mouseStartY;
            if (delta > 0) {
                modal.style.transform = `translateY(${delta}px)`;
                modal.style.opacity = '0.7';
            }
        });
        
        window.addEventListener('mouseup', (e) => {
            if (!mouseDown) return;
            const delta = e.clientY - mouseStartY;
            if (delta > 80) closeModal(modalId, contentId);
            modal.style.transform = '';
            modal.style.opacity = '';
            mouseDown = false;
        });
    }

    initSwipeClose('stickerModal', 'stickerHandle', 'stickerModalContent');
    initSwipeClose('attachModal', 'attachHandle', 'attachModalContent');

    document.getElementById('stickerBtn').onclick = () => openModal('stickerModal', renderStickerModal);
    document.getElementById('attachBtn').onclick = () => openModal('attachModal', renderAttachModal);
    
    document.getElementById('sendBtn').onclick = () => {
        const inp = document.getElementById('messageInput');
        if (inp.value.trim()) sendMessage(inp.value);
        inp.value = '';
    };
    
    document.getElementById('settingsBtn').onclick = () => {
        window.location.href = 'settings.html';
    };
</script>
</body>
</html>
